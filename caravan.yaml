# Caravan application descriptor for code-rag.
#
# The user-authored input to `caravan compile --target=<name>`. Maps
# the existing code-rag Rust crates onto Caravan's vocabulary:
# entries (deploy units), seams (synchronous abstraction boundaries
# inside the codebase), and per-target dispatch overrides.
#
# Status: M5. All four #[wagon] seams declared:
#   * Embedder      — full HTTP codegen since M2.
#   * Reranker      — full HTTP codegen since M5 (RerankResult wire shim
#                     in code-rag-store landed at M5 Session 1).
#   * LlmClient     — full HTTP codegen since M5 (RigGeminiImpl moved
#                     to the dedicated code-rag-llm crate at M5 Session 2
#                     so synthetic peer services can build against it).
#   * VectorReader  — full HTTP codegen since M2 (async-trait support);
#                     companion VectorWriter (M5 split) stays inproc-only.
# Per-seam mode flips are now independent: the dev-split-mixed and
# dev-split-heavy targets exercise multiple simultaneous container-mode
# seams.

name: code-rag
default_target: dev-monolith
# Pin Caravan's per-target write root to the pre-existing `infra/<target>/generated/`
# layout (otherwise the compiler defaults to `caravan-out/`). All committed
# generated artifacts + the docker-compose layering hints assume `infra/`.
output_dir: infra

# Deploy units. `code-rag-chat` matches the existing
# docker-compose.yaml service name so the M2 override layers cleanly
# on top: docker compose -f docker-compose.yaml -f infra/<target>/
# generated/docker-compose.override.generated.yaml up.
entries:
  code-rag-chat:
    path: .
    dockerfile: dockerfile/Dockerfile
    # Multi-stage Dockerfile has two targets (chat, raptor); Caravan
    # reuses the chat image for the peer service when a Rust seam
    # flips to `container` mode (via `caravan_rpc::run_or_serve`
    # detouring based on CARAVAN_RPC_ROLE).
    runtime_target: chat
    # `.env` (path-style relative to compose project dir = code-rag/)
    # holds GEMINI_API_KEY + other runtime secrets. The chat container
    # already pulls this via the hand-authored base compose; Caravan
    # also inherits it onto Rust peer services that reuse the chat
    # image, because the peer runs the same binary and AppState init
    # constructs the same impls (which read the same env vars).
    env_file: .env

# Seam declarations match the #[wagon] traits in
# crates/code-rag-store/src/seams.rs. All four are full HTTP codegen
# since M5; per-seam dispatch mode is decided independently per target
# (see the targets block below). Peers reuse the chat image via
# `caravan_rpc::run_or_serve` + CARAVAN_RPC_ROLE=peer-<Interface>.
seams:
  Embedder:
    impl: code_rag_store::FastEmbedImpl
    service_name: embedder

  Reranker:
    # MsMarcoRerankerImpl wraps fastembed's cross-encoder. Returns
    # code_rag_store::seams::RerankResult (the M5 wire shim with
    # serde derives).
    impl: code_rag_store::reranker::MsMarcoRerankerImpl
    service_name: reranker

  VectorReader:
    # The concrete VectorStore impls both VectorReader (reads) and
    # VectorWriter (writes). The peer service constructs a fresh
    # VectorStore in its own process and serves only the reader trait
    # (writes are inproc-only by design).
    impl: code_rag_store::vector_store::VectorStore
    service_name: vector-reader

  LlmClient:
    # RigGeminiImpl lives in code-rag-llm (M5 crate extraction). The
    # peer's `run_or_serve` builds the router off the same impl the
    # chat binary's AppState constructed via `provide()`.
    impl: code_rag_llm::RigGeminiImpl
    service_name: llm-client

# Targets. The thesis claim — yaml-line changes flip per-seam dispatch
# without source-code edits — is provable across the four targets here:
#
# * dev-monolith       — all seams inproc. Baseline.
# * dev-split-light    — Embedder container, rest inproc. (M2 demo.)
# * dev-split-mixed    — Embedder + Reranker container, rest inproc.
#                        Proves two simultaneous seam flips.
# * dev-split-heavy    — Embedder + Reranker + LlmClient container,
#                        VectorReader inproc. Three flips; only
#                        VectorReader stays local (it owns LanceDB
#                        files, embedded storage doesn't flip cleanly
#                        at Phase 1).
#
# Acceptance: `curl POST /chat` returns byte-identical chunk_ids
# across all four targets. Source diff is empty between any pair.
targets:
  dev-monolith:
    runtime: docker-compose
    entries: { code-rag-chat: container }
    # seams omitted → all inproc

  dev-split-light:
    runtime: docker-compose
    entries: { code-rag-chat: container }
    seams: { Embedder: container }

  dev-split-mixed:
    runtime: docker-compose
    entries: { code-rag-chat: container }
    seams:
      Embedder: container
      Reranker: container
      # VectorReader + LlmClient default to inproc

  dev-split-heavy:
    runtime: docker-compose
    entries: { code-rag-chat: container }
    seams:
      Embedder: container
      Reranker: container
      LlmClient: container
      # VectorReader stays inproc (owns the LanceDB filesystem).
