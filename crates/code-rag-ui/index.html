<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function () {
            var p = new URL(location.href).searchParams.get('theme');
            var t = p || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
            document.documentElement.dataset.theme = t;
            addEventListener('message', function (e) {
                if (e.data && e.data.type === 'theme') {
                    document.documentElement.dataset.theme = e.data.value;
                }
            });
        })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code RAG Chat</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link data-trunk rel="css" href="style/main.css" />
    <link data-trunk rel="copy-dir" href="public/fonts" />
    <link data-trunk rel="copy-dir" href="static" />
</head>
<body>
    <script type="module" src="static/embedder.js"></script>
    <script type="module" src="static/reranker.js"></script>
</body>
</html>
